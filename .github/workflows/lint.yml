name: Linting Protocol

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # Cache removed because lockfile is missing
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Linter
        run: npm run lint
